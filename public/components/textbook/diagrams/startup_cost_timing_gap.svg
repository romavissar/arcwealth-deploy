<svg width="100%" viewBox="0 0 860 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Startup cost timing gap diagram</title>
  <desc>Timeline showing startup costs landing before term starts, while loans and work income activate later.</desc>

  <rect x="0" y="0" width="860" height="420" rx="18" fill="#0b1220"/>
  <text x="36" y="42" fill="#dbeafe" font-size="22" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-weight="700">
    Startup Cost Timing Gap
  </text>
  <text x="36" y="66" fill="#94a3b8" font-size="14" font-family="-apple-system, system-ui, Segoe UI, sans-serif">
    Costs arrive early; major funding activates at/after term start.
  </text>

  <line x1="70" y1="102" x2="790" y2="102" stroke="#475569" stroke-width="2"/>

  <g fill="#cbd5e1" font-size="13" font-family="-apple-system, system-ui, Segoe UI, sans-serif" text-anchor="middle">
    <text x="90" y="92">-12m</text>
    <text x="210" y="92">-9m</text>
    <text x="330" y="92">-6m</text>
    <text x="450" y="92">-3m</text>
    <text x="570" y="92">0</text>
    <text x="690" y="92">+1m</text>
  </g>

  <g stroke="#64748b" stroke-width="1">
    <line x1="90" y1="97" x2="90" y2="107"/>
    <line x1="210" y1="97" x2="210" y2="107"/>
    <line x1="330" y1="97" x2="330" y2="107"/>
    <line x1="450" y1="97" x2="450" y2="107"/>
    <line x1="570" y1="97" x2="570" y2="107"/>
    <line x1="690" y1="97" x2="690" y2="107"/>
  </g>

  <line x1="570" y1="76" x2="570" y2="352" stroke="#ef4444" stroke-width="2" stroke-dasharray="5 5"/>
  <text x="570" y="370" fill="#fecaca" text-anchor="middle" font-size="12" font-family="-apple-system, system-ui, Segoe UI, sans-serif">
    Term starts
  </text>

  <g font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="12" font-weight="600">
    <rect x="78" y="132" width="130" height="34" rx="7" fill="#7c2d12" stroke="#fb923c"/>
    <text x="143" y="153" fill="#ffedd5" text-anchor="middle">Application fees</text>

    <rect x="220" y="132" width="145" height="34" rx="7" fill="#7c2d12" stroke="#fb923c"/>
    <text x="292" y="153" fill="#ffedd5" text-anchor="middle">Test fees</text>

    <rect x="334" y="180" width="120" height="34" rx="7" fill="#7c2d12" stroke="#fb923c"/>
    <text x="394" y="201" fill="#ffedd5" text-anchor="middle">Visa fees</text>

    <rect x="458" y="180" width="140" height="34" rx="7" fill="#7c2d12" stroke="#fb923c"/>
    <text x="528" y="201" fill="#ffedd5" text-anchor="middle">Housing deposit</text>

    <rect x="458" y="228" width="96" height="34" rx="7" fill="#7c2d12" stroke="#fb923c"/>
    <text x="506" y="249" fill="#ffedd5" text-anchor="middle">Laptop</text>

    <rect x="618" y="180" width="90" height="34" rx="7" fill="#7c2d12" stroke="#fb923c"/>
    <text x="663" y="201" fill="#ffedd5" text-anchor="middle">Flights</text>

    <rect x="618" y="228" width="90" height="34" rx="7" fill="#7c2d12" stroke="#fb923c"/>
    <text x="663" y="249" fill="#ffedd5" text-anchor="middle">Setup</text>
  </g>

  <text x="36" y="302" fill="#bfdbfe" font-size="14" font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-weight="700">
    When funding becomes available
  </text>

  <g font-family="-apple-system, system-ui, Segoe UI, sans-serif" font-size="12" font-weight="600">
    <rect x="78" y="316" width="150" height="34" rx="7" fill="#065f46" stroke="#2dd4bf"/>
    <text x="153" y="337" fill="#ccfbf1" text-anchor="middle">Personal savings</text>

    <rect x="612" y="316" width="112" height="34" rx="7" fill="#334155" stroke="#94a3b8"/>
    <text x="668" y="337" fill="#e2e8f0" text-anchor="middle">Student loan</text>
  </g>

  <g fill="#cbd5e1" font-size="12" font-family="-apple-system, system-ui, Segoe UI, sans-serif">
    <rect x="36" y="384" width="10" height="10" rx="2" fill="#fb923c"/>
    <text x="52" y="393">Coral = startup costs</text>
    <rect x="215" y="384" width="10" height="10" rx="2" fill="#2dd4bf"/>
    <text x="231" y="393">Teal = available early</text>
    <rect x="405" y="384" width="10" height="10" rx="2" fill="#94a3b8"/>
    <text x="421" y="393">Gray = activates at/after term start</text>
  </g>
</svg>
