<h2 class="sr-only">Interactive Total Cost of Attendance calculator with sliders for six spending categories</h2>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fbff;
    --card: #ffffff;
    --surface: #f1f5f9;
    --text: #0f172a;
    --muted: #475569;
    --border: #dbeafe;
    --grid: rgba(148, 163, 184, 0.22);
    --accent: #7c3aed;
    --accent2: #14b8a6;
    --tooltipBg: #0f172a;
    --tooltipText: #f8fafc;
  }
  :root[data-theme="dark"] {
    --bg: #0b1220;
    --card: #0f172a;
    --surface: #111c2e;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --border: #334155;
    --grid: rgba(148, 163, 184, 0.16);
    --accent: #a78bfa;
    --accent2: #2dd4bf;
    --tooltipBg: #e2e8f0;
    --tooltipText: #0f172a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 14px;
    font-family: Inter, "DM Sans", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
  }
  .rows { margin-bottom: 16px; }
  .cat-row {
    display: grid;
    grid-template-columns: 1fr minmax(110px, 140px) 78px;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 10px;
    background: var(--card);
  }
  .cat-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
  }
  .cat-val {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    text-align: right;
  }
  input[type="range"] {
    width: 100%;
    appearance: none;
    height: 6px;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 999px;
    border: 2px solid #fff;
    background: var(--accent);
    box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.2);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 999px;
    border: 2px solid #fff;
    background: var(--accent);
  }
  .totals {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }
  .total-card {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    background: var(--surface);
  }
  .total-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .total-value {
    display: block;
    margin-top: 4px;
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
  }
  .chart-wrap { position: relative; width: 100%; height: 200px; margin-top: 12px; }
  @media (max-width: 520px) {
    .cat-row { grid-template-columns: 1fr; gap: 6px; }
    .cat-val { text-align: left; }
    .totals { grid-template-columns: 1fr; }
  }
</style>

<div class="rows">
  <div class="cat-row">
    <label class="cat-label" for="s0">Tuition</label>
    <input type="range" id="s0" min="0" max="70000" step="500" value="15000">
    <span class="cat-val" id="v0">$15,000</span>
  </div>
  <div class="cat-row">
    <label class="cat-label" for="s1">Accommodation</label>
    <input type="range" id="s1" min="0" max="20000" step="250" value="8000">
    <span class="cat-val" id="v1">$8,000</span>
  </div>
  <div class="cat-row">
    <label class="cat-label" for="s2">Food</label>
    <input type="range" id="s2" min="0" max="8000" step="100" value="3500">
    <span class="cat-val" id="v2">$3,500</span>
  </div>
  <div class="cat-row">
    <label class="cat-label" for="s3">Transport</label>
    <input type="range" id="s3" min="0" max="5000" step="100" value="1200">
    <span class="cat-val" id="v3">$1,200</span>
  </div>
  <div class="cat-row">
    <label class="cat-label" for="s4">Course materials</label>
    <input type="range" id="s4" min="0" max="3000" step="50" value="600">
    <span class="cat-val" id="v4">$600</span>
  </div>
  <div class="cat-row">
    <label class="cat-label" for="s5">Personal spending</label>
    <input type="range" id="s5" min="0" max="8000" step="100" value="2000">
    <span class="cat-val" id="v5">$2,000</span>
  </div>
</div>

<div class="totals">
  <div class="total-card">
    <span class="total-label">Annual TCA</span>
    <span class="total-value" id="total">$30,300</span>
  </div>
  <div class="total-card">
    <span class="total-label">4-year estimate</span>
    <span class="total-value" id="total4">$121,200</span>
  </div>
</div>

<div class="chart-wrap">
  <canvas id="tcaBar" role="img" aria-label="Horizontal bar chart showing TCA broken down by category">Adjust the sliders above to see your personal TCA breakdown.</canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  function detectTheme() {
    try {
      if (window.parent && window.parent.document?.documentElement.classList.contains("dark")) return "dark";
    } catch {}
    return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  }

  function applyTheme() {
    document.documentElement.setAttribute("data-theme", detectTheme());
  }

  function palette() {
    const s = getComputedStyle(document.documentElement);
    const isDark = document.documentElement.getAttribute("data-theme") === "dark";
    return {
      colors: isDark
        ? ["#a78bfa", "#2dd4bf", "#fbbf24", "#f87171", "#60a5fa", "#cbd5e1"]
        : ["#7c3aed", "#14b8a6", "#f59e0b", "#ef4444", "#3b82f6", "#64748b"],
      tick: s.getPropertyValue("--muted").trim(),
      grid: s.getPropertyValue("--grid").trim(),
      tooltipBg: s.getPropertyValue("--tooltipBg").trim(),
      tooltipText: s.getPropertyValue("--tooltipText").trim(),
    };
  }

  const labels = ["Tuition", "Accommodation", "Food", "Transport", "Materials", "Personal"];
  let chart;

  function buildChart(values) {
    const c = palette();
    if (chart) chart.destroy();
    chart = new Chart(document.getElementById("tcaBar"), {
      type: "bar",
      data: { labels, datasets: [{ data: values, backgroundColor: c.colors, borderRadius: 6, borderSkipped: false }] },
      options: {
        indexAxis: "y",
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: c.tooltipBg,
            titleColor: c.tooltipText,
            bodyColor: c.tooltipText,
            callbacks: { label: (ctx) => `$${ctx.raw.toLocaleString()}` },
          },
        },
        scales: {
          x: { ticks: { callback: (v) => `$${Math.round(v / 1000)}k`, font: { size: 11 }, color: c.tick }, grid: { color: c.grid } },
          y: { ticks: { font: { size: 12, weight: "600" }, color: c.tick }, grid: { display: false } },
        },
      },
    });
  }

  function formatCurrency(n) { return `$${Math.round(n).toLocaleString()}`; }
  function getValues() { return [0, 1, 2, 3, 4, 5].map((i) => parseInt(document.getElementById(`s${i}`).value, 10)); }

  function update() {
    const values = getValues();
    values.forEach((value, i) => { document.getElementById(`v${i}`).textContent = formatCurrency(value); });
    const total = values.reduce((sum, value) => sum + value, 0);
    document.getElementById("total").textContent = formatCurrency(total);
    document.getElementById("total4").textContent = formatCurrency(total * 4);
    if (chart) {
      chart.data.datasets[0].data = values;
      chart.update();
    }
  }

  function bindEvents() {
    [0, 1, 2, 3, 4, 5].forEach((i) => {
      document.getElementById(`s${i}`).addEventListener("input", update);
    });
    const mql = window.matchMedia("(prefers-color-scheme: dark)");
    mql.addEventListener?.("change", () => {
      applyTheme();
      buildChart(getValues());
      update();
    });
    try {
      const root = window.parent.document.documentElement;
      new MutationObserver(() => {
        applyTheme();
        buildChart(getValues());
        update();
      }).observe(root, { attributes: true, attributeFilter: ["class"] });
    } catch {}
  }

  applyTheme();
  buildChart(getValues());
  update();
  bindEvents();

  function postEmbedHeight() {
    try {
      const height = Math.ceil(document.documentElement.scrollHeight);
      window.parent.postMessage({ type: "arcwealth-embed-height", src: window.location.pathname, height }, window.location.origin);
    } catch {}
  }

  const resizeObserver = new ResizeObserver(postEmbedHeight);
  resizeObserver.observe(document.body);
  window.addEventListener("load", postEmbedHeight);
  [0, 1, 2, 3, 4, 5].forEach((i) => {
    document.getElementById(`s${i}`).addEventListener("input", () => {
      setTimeout(postEmbedHeight, 0);
    });
  });
  setTimeout(postEmbedHeight, 50);
  setTimeout(postEmbedHeight, 250);
</script>
